# ============================================================================
# 金蝶WebAPI智能问答系统 - 配置文件
# ============================================================================

# ============================================================================
# DeepSeek API 配置
# ============================================================================

# DeepSeek API密钥 (必填)
deepseek.api.key=自己的API密钥

# DeepSeek API基础URL
deepseek.api.base_url=https://api.deepseek.com

# 使用的模型名称
deepseek.model=deepseek-chat

# ============================================================================
# 金蝶WebAPI 配置
# ============================================================================

# 金蝶WebAPI基础URL (必填)
kingdee.api.base_url=http://8.159.146.158/k3cloud

# 金蝶账套ID (必填，从管理中心数据库查询: select FDATACENTERID from T_BAS_DATACENTER)
kingdee.api.acct_id=

# 金蝶登录用户名 (必填)
kingdee.api.username=

# 金蝶登录密码 (必填)
kingdee.api.password=

# ============================================================================
# 系统配置
# ============================================================================

# 最大对话历史长度 (默认10)
system.max_conversation_history=10

# 最大迭代次数 (默认20)
system.max_iterations=50

# 调试模式，true时显示详细错误堆栈
system.debug_mode=false
