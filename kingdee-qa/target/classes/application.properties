# ============================================================================
# Spring Boot 基础配置
# ============================================================================
server.port=8080
spring.application.name=kingdee-qa

# 静态资源路径（index.html 放在 resources/static/）
spring.web.resources.static-locations=classpath:/static/

# 上传文件大小限制
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Actuator 健康检查
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# JSON 响应编码
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# ============================================================================
# DeepSeek API 配置
# ============================================================================
deepseek.api.key=
deepseek.api.base_url=https://api.deepseek.com
deepseek.model=deepseek-chat

# ============================================================================
# 金蝶 WebAPI 配置
# ============================================================================
kingdee.api.base_url=http://8.159.146.158/k3cloud
# 留空则跳过自动登录，请通过页面右上角「登录金蝶」手动登录
kingdee.api.acct_id=
kingdee.api.username=
kingdee.api.password=

# ============================================================================
# 系统配置
# ============================================================================
system.max_conversation_history=10
system.max_iterations=50
system.debug_mode=false

